name: lofiever

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Database
      - DATABASE_URL=postgresql://${SERVICE_USER_POSTGRES:-postgres}:${SERVICE_PASSWORD_POSTGRES:-postgres}@postgres:5432/${POSTGRES_DB:-lofiever}?schema=public
      # Redis
      - REDIS_URL=redis://redis:6379
      # Auth (required)
      - NEXTAUTH_URL=${SERVICE_FQDN_APP:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${SERVICE_FQDN_APP:-http://localhost:3000}
      - APP_INTERNAL_URL=${APP_INTERNAL_URL:-http://app:3000}
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required}
      # Admin access
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Cloudflare R2 (optional - features disabled if not set)
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      # Icecast (required for streaming)
      - ICECAST_HOST=icecast
      - ICECAST_PORT=8000
      - ICECAST_MOUNT=/stream
      - ICECAST_URL=http://icecast:8000
      - ICECAST_STREAM_URL=http://icecast:8000/stream
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:?ICECAST_SOURCE_PASSWORD is required}
      - ICECAST_ADMIN_USER=${ICECAST_ADMIN_USER:-admin}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD:?ICECAST_ADMIN_PASSWORD is required}
      # API Security (required)
      - API_SECRET_KEY=${API_SECRET_KEY:?API_SECRET_KEY is required}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - AI_REPLY_MIN_LISTENERS=${AI_REPLY_MIN_LISTENERS:-1}
      # YouTube Music Integration
      - YOUTUBE_ENABLED=${YOUTUBE_ENABLED:-false}
      - YOUTUBE_COOKIES_PATH=${YOUTUBE_COOKIES_PATH:-/data/youtube-cookies.txt}
      - YOUTUBE_CACHE_DIR=${YOUTUBE_CACHE_DIR:-/data/youtube-cache}
      - YOUTUBE_CACHE_TTL_DAYS=${YOUTUBE_CACHE_TTL_DAYS:-7}
      - YOUTUBE_AUDIO_FORMAT=${YOUTUBE_AUDIO_FORMAT:-opus}
      - YOUTUBE_AUDIO_QUALITY=${YOUTUBE_AUDIO_QUALITY:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
    volumes:
      - app-uploads:/app/public/uploads
      - youtube-cache:/data/youtube-cache

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    environment:
      - POSTGRES_USER=${SERVICE_USER_POSTGRES:-postgres}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-lofiever}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SERVICE_USER_POSTGRES:-postgres} -d ${POSTGRES_DB:-lofiever}"]
      interval: 10s
      timeout: 5s
      retries: 5

  icecast:
    image: moul/icecast
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:?ICECAST_SOURCE_PASSWORD is required}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD:?ICECAST_ADMIN_PASSWORD is required}
      - ICECAST_RELAY_PASSWORD=${ICECAST_RELAY_PASSWORD:?ICECAST_RELAY_PASSWORD is required}
      - ICECAST_ADMIN_USER=${ICECAST_ADMIN_USER:-admin}
      - ICECAST_HOSTNAME=${ICECAST_HOSTNAME:-localhost}
      - ICECAST_MAX_CLIENTS=100
      - ICECAST_MAX_SOURCES=2

  liquidsoap:
    build:
      context: ./streaming/liquidsoap
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    depends_on:
      - icecast
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:?ICECAST_SOURCE_PASSWORD is required}
      - ICECAST_HOST=icecast
      - ICECAST_PORT=8000
      - API_HOST=app
      - API_PORT=3000

volumes:
  redis-data:
  postgres-data:
  app-uploads:
  music-data:
  youtube-cache:
